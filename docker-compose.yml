services:

  postgres-request:
    image: postgres:16
    container_name: postgres-request
    restart: unless-stopped
    environment:
      POSTGRES_DB: ia-image-request
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"

  postgres-validate:
    image: postgres:16
    container_name: postgres-validate
    restart: unless-stopped
    environment:
      POSTGRES_DB: ia-image-validate
      POSTGRES_USER: admin2
      POSTGRES_PASSWORD: admin2
    ports:
      - "5434:5432"

  postgres-generate:
    image: postgres:16
    container_name: postgres-generate
    restart: unless-stopped
    environment:
      POSTGRES_DB: ia-image-generate
      POSTGRES_USER: admin3
      POSTGRES_PASSWORD: admin3
    ports:
      - "5435:5432"

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  image-request:
    container_name: image-request
    build:
      context: ./image-request
    ports:
      - "8080:8080"
    depends_on:
      - postgres-request
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-request:5432/ia-image-request
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093

  image-validate:
    container_name: image-validate
    build:
      context: ./image-validate
    ports:
      - "8081:8081"
    depends_on:
      - postgres-validate
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-validate:5432/ia-image-validate
      SPRING_DATASOURCE_USERNAME: admin2
      SPRING_DATASOURCE_PASSWORD: admin2
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093

  image-generate:
    container_name: image-generate
    build:
      context: ./image-generate
    ports:
      - "8082:8082"
    depends_on:
      - postgres-generate
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-generate:5432/ia-image-generate
      SPRING_DATASOURCE_USERNAME: admin3
      SPRING_DATASOURCE_PASSWORD: admin3
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
